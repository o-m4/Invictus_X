<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Chats - Smart CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/chat.css"/>
</head>
<body>
<div class="chat-layout">

  <!-- ── Sidebar ──────────────────────────────────────── -->
  <aside class="chat-sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">My Chats</span>
      <a href="activity.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><polyline points="15,18 9,12 15,6"/></svg>
        Back
      </a>
    </div>
    <div class="sidebar-search">
      <input id="convSearch" type="text" placeholder="Search..." oninput="filterConvs()"/>
    </div>
    <div class="conv-list" id="convList"></div>
  </aside>

  <!-- ── Chat Window ───────────────────────────────────── -->
  <div class="chat-window">

    <!-- Topbar -->
    <div class="chat-topbar">
      <div class="topbar-avatar" id="topbarAvatar">S</div>
      <div class="topbar-info">
        <div class="topbar-name" id="topbarName">Select a conversation</div>
        <div class="topbar-sub"  id="topbarSub">—</div>
      </div>
      <div class="topbar-status">
        <span class="online-dot"></span> Online
      </div>
    </div>

    <!-- Info Strip -->
    <div class="info-strip">
      <div class="info-chip">
        <span class="info-label">Status</span>
        <span class="info-val" id="infoStatus">—</span>
      </div>
      <div class="info-chip">
        <span class="info-label">SLA Date</span>
        <span class="info-val" id="infoSla">—</span>
      </div>
      <div class="info-chip">
        <span class="info-label">Department</span>
        <span class="info-val" id="infoDept">—</span>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages-area" id="messagesArea"></div>

    <!-- Typing -->
    <div class="typing-row" id="typingIndicator" style="display:none;">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      Officer is typing...
    </div>

    <!-- Quick chips -->
    <div class="quick-bar" id="quickBar"></div>

    <!-- Input -->
    <div class="input-bar">
      <div class="input-wrap">
        <label class="attach-label" for="fileInput" title="Attach photo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </label>
        <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="attachPhoto(this)"/>
        <input type="text" id="msgInput" class="msg-input" placeholder="Type your message..."/>
      </div>
      <button class="send-btn" onclick="sendMessage()" id="sendBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
      </button>
    </div>

  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav" style="position:fixed;bottom:0;width:100%;z-index:100;">
  <a href="citizen.html"  class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg><span>Home</span></a>
  <a href="activity.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span>Activity</span></a>
  <a href="profile.html"  class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profile</span></a>
</nav>

<script>window.CHAT_ROLE = "citizen";</script>
<script src="js/chat.js"></script>
</body>
</html>
